<script>
function calc(){
  let oldW = parseFloat(document.getElementById("oldW").value);
  let newW = parseFloat(document.getElementById("newW").value);
  let period = parseInt(document.getElementById("period").value);

  // 防呆
  if (isNaN(oldW) || isNaN(newW)) {
    result.innerHTML = "請輸入完整數據";
    return;
  }

  if (oldW <= 0) {
    result.innerHTML = "原體重需大於0";
    return;
  }

  let change = ((newW - oldW) / oldW) * 100; // 正=增加，負=下降

  let text = "";
  let risk = "🟢 無顯著風險";

  // === 體重增加 ===
  if (change > 0) {
    text = "體重變化：+" + change.toFixed(1) + "%（增加）";
  } 
  // === 體重下降 ===
  else {
    let loss = Math.abs(change);
    text = "體重變化：" + loss.toFixed(1) + "%（下降）";

    // 期間特異判斷
    if (period == 7 && loss > 2) {
      risk = "🔴 高風險（1週 >2%）";
    } 
    else if (period == 30 && loss > 5) {
      risk = "🔴 高風險（1個月 >5%）";
    } 
    else if (period == 90 && loss > 7.5) {
      risk = "🟠 中度風險（3個月 >7.5%）";
    } 
    else if (period == 180 && loss > 10) {
      risk = "🔴 高風險（6個月 >10%）";
    } 
    else if (loss > 2) {
      risk = "🟡 輕度風險（需追蹤）";
    }
  }

  document.getElementById("result").innerHTML =
    text + "<br><br>" +
    "風險判讀：" + risk + "<br><br>" +
    "建議：持續監測體重變化，必要時轉介營養評估";
}
</script>
