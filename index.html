<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>照護導航 Pro</title>
    <style>
        :root {
            --primary: #5c7cfa;
            --primary-light: #edf2ff;
            --green: #2fb344;
            --orange: #f59f00;
            --red: #d63939;
            --text-dark: #212529;
            --text-gray: #666;
            --card-bg: #ffffff;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans TC", sans-serif;
            background-color: #f1f3f5;
            color: var(--text-dark);
            margin: 0;
            padding: 16px;
            line-height: 1.6;
        }

        .header { text-align: center; padding: 20px 0; }
        .header h2 { margin: 0; color: var(--primary); font-size: 1.6rem; letter-spacing: 1px; }

        /* 卡片設計 */
        .card { 
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.02);
        }

        h3 { 
            font-size: 1.2rem;
            margin-top: 0;
            margin-bottom: 20px;
            color: var(--primary);
            display: flex;
            align-items: center;
        }
        h3::before {
            content: "";
            display: inline-block;
            width: 6px;
            height: 22px;
            background: var(--primary);
            margin-right: 12px;
            border-radius: 10px;
        }

        /* 體重與下拉選單 */
        label { display: block; margin: 15px 0 5px; font-weight: bold; font-size: 0.95rem; }
        input[type="number"], select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; background: #fff; }
        
        /* 副作用複選框色塊化 */
        .checkbox-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .checkbox-item { 
            background: #f8f9fa; 
            padding: 16px; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.2s;
        }
        .checkbox-item:active { background: var(--primary-light); }
        .checkbox-item input { width: 22px; height: 22px; margin-right: 15px; accent-color: var(--primary); }

        /* 滑桿與節點設計 */
        .slider-wrapper { margin-bottom: 30px; position: relative; }
        .slider-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .score-display { font-size: 1.4rem; font-weight: 900; padding: 2px 10px; border-radius: 6px; }
        
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 10px; border-radius: 5px; background: #eee; outline: none; margin: 15px 0; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%; background: #fff; border: 3px solid var(--primary); cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        .marks { display: flex; justify-content: space-between; padding: 0 5px; font-size: 0.75rem; color: #888; }
        .sleep-labels { display: flex; justify-content: space-between; margin-top: 5px; font-size: 0.75rem; color: #666; text-align: center; }
        .sleep-labels span { width: 20%; }

        /* 按鈕 */
        .btn-submit { 
            width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 16px; 
            font-size: 1.2rem; font-weight: bold; cursor: pointer; box-shadow: 0 10px 20px rgba(92,124,250,0.3);
            margin: 20px 0 40px;
        }

        /* 評估報告區 */
        #result { 
            display: none; 
            background: #fff; 
            border-top: 10px solid var(--primary);
            padding: 30px 24px;
        }
        .report-title { font-size: 1.4rem; font-weight: bold; margin-bottom: 20px; color: #333; text-align: center; }
        .weight-result { 
            background: var(--primary-light); padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 25px; 
        }
        .weight-num { font-size: 2rem; font-weight: 800; color: var(--primary); }
        
        .advice-section { font-size: 1.15rem; line-height: 1.8; }
        .advice-item { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .advice-item b { color: var(--primary); font-size: 1.2rem; display: block; margin-bottom: 5px; }

        .urgent { color: var(--red); font-weight: 800; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="header">
        <h2>照護導航自我評估</h2>
    </div>

    <div class="card">
        <h3>1. 體重監測</h3>
        <label>原始體重 (kg)</label>
        <input id="oldW" type="number" step="0.1" placeholder="請輸入數值">
        <label>目前體重 (kg)</label>
        <input id="newW" type="number" step="0.1" placeholder="請輸入數值">
        <label>比較時間範圍</label>
        <select id="period">
            <option value="7">一週內</option>
            <option value="30">一個月內</option>
            <option value="90">三個月內</option>
            <option value="180">六個月內</option>
        </select>
    </div>

    <div class="card">
        <h3>2. 治療副作用（可多選）</h3>
        <div class="checkbox-grid">
            <label class="checkbox-item"><input type="checkbox" value="appetite"> 食慾不振</label>
            <label class="checkbox-item"><input type="checkbox" value="dry"> 口乾</label>
            <label class="checkbox-item"><input type="checkbox" value="mouth"> 口腔潰瘍</label>
            <label class="checkbox-item"><input type="checkbox" value="taste"> 味覺改變</label>
            <label class="checkbox-item"><input type="checkbox" value="nausea"> 噁心 / 嘔吐</label>
            <label class="checkbox-item"><input type="checkbox" value="bloating"> 腹脹</label>
            <label class="checkbox-item"><input type="checkbox" value="diarrhea"> 腹瀉</label>
            <label class="checkbox-item"><input type="checkbox" value="constipation"> 便秘</label>
            <label class="checkbox-item"><input type="checkbox" value="tube"> 灌食管路阻塞或滲漏</label>
        </div>
    </div>

    <div class="card">
        <h3>3. 自我身心評估</h3>
        
        <div class="slider-wrapper">
            <div class="slider-header">
                <span>疲憊無力</span>
                <span id="txt-fatigue" class="score-display" style="color:var(--green)">1</span>
            </div>
            <input type="range" id="fatigue" min="1" max="10" value="1" oninput="updateSlider(this, 'txt-fatigue')">
            <div class="marks"><span>1 (最低)</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>10 (最高)</span></div>
        </div>

        <div class="slider-wrapper">
            <div class="slider-header">
                <span>疼痛程度</span>
                <span id="txt-pain" class="score-display" style="color:var(--green)">1</span>
            </div>
            <input type="range" id="pain" min="1" max="10" value="1" oninput="updateSlider(this, 'txt-pain')">
            <div class="marks"><span>1 (最低)</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>10 (最高)</span></div>
        </div>

        <div class="slider-wrapper">
            <div class="slider-header">
                <span>心情溫度計 (情緒困擾)</span>
                <span id="txt-mood" class="score-display" style="color:var(--green)">1</span>
            </div>
            <input type="range" id="mood" min="1" max="10" value="1" oninput="updateSlider(this, 'txt-mood')">
            <div class="marks"><span>1 (最低)</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>10 (最高)</span></div>
        </div>

        <div class="slider-wrapper">
            <div class="slider-header">
                <span>睡眠品質</span>
                <span id="txt-sleep" class="score-display" style="color:var(--green)">很好</span>
            </div>
            <input type="range" id="sleep" min="1" max="5" value="5" oninput="updateSleepSlider(this)">
            <div class="sleep-labels">
                <span>很差</span><span>差</span><span>普通</span><span>好</span><span>很好</span>
            </div>
        </div>
    </div>
   

    <button class="btn-submit" onclick="run()">生成完整評估報告</button>

    <div id="result" class="card">
        <div class="report-title">您的個人照護報告</div>
        
        <div class="weight-result">
            <div id="w-summary"></div>
            <div id="w-risk" style="margin-top:10px; font-weight:bold;"></div>
        </div>

        <div class="advice-section" id="advice-content"></div>

        <div id="emergency-area"></div>
    </div>

    <script>
    // 修正：函數名稱與 HTML input 上的 oninput 呼叫一致
    function updateSlider(el, tid) {
        let v = parseInt(el.value);
        let t = document.getElementById(tid);
        t.innerText = v;
        // 變色邏輯：1-3綠, 4-6橘, 7-10紅
        if(v <= 3) t.style.color = "var(--green)";
        else if(v <= 6) t.style.color = "var(--orange)";
        else t.style.color = "var(--red)";
    }

    // 修正：睡眠品質函數與顏色對應
    function updateSleepSlider(el) {
        const labels = ["", "很差", "差", "普通", "好", "很好"];
        let v = parseInt(el.value);
        let t = document.getElementById('txt-sleep');
        t.innerText = labels[v];
        // 變色邏輯：4-5綠, 3橘, 1-2紅
        if(v >= 4) t.style.color = "var(--green)";
        else if(v == 3) t.style.color = "var(--orange)";
        else t.style.color = "var(--red)";
    }

    function run() {
        const oW = parseFloat(document.getElementById("oldW").value);
        const nW = parseFloat(document.getElementById("newW").value);
        const p = parseInt(document.getElementById("period").value);
        
        if (isNaN(oW) || isNaN(nW)) { alert("請填寫體重資料"); return; }

        let change = ((nW - oW) / oW) * 100;
        let loss = Math.abs(change);
        let riskLvl = "🟢 穩定";
        let color = "var(--green)";
        let isHR = false;

        if (change < 0) {
            if ((p==7 && loss>2) || (p==30 && loss>5) || (p==180 && loss>10)) {
                riskLvl = "🔴 高風險下降"; color = "var(--red)"; isHR = true;
            } else if (loss > 2) {
                riskLvl = "🟡 輕度下降"; color = "var(--orange)";
            }
        }

        document.getElementById("w-summary").innerHTML = `體重變化：<span class="weight-num">${change.toFixed(1)}%</span>`;
        document.getElementById("w-risk").innerHTML = `<span style="color:${color}">${riskLvl}</span>`;

        // 建議清單
        const maps = {
            appetite: "少量多餐（一日6-8餐），選擇高熱量高蛋白食物，如布丁、堅果奶。",
            dry: "小口頻繁喝水，或含冰塊、無糖糖果刺激唾液，避免過鹹食物。",
            mouth: "選擇溫涼軟質食物（如蒸蛋、稀飯），避開酸性與粗糙口感。",
            taste: "嘗試檸檬汁或香料提味，若有金屬感可改用塑膠或木質餐具。",
            nausea: "避免油膩與重味食物，進食後一小時不平躺，維持空氣流通。",
            bloating: "避開產氣食物（豆類、十字花科），餐後適度緩步活動。",
            diarrhea: "採低纖飲食（白米飯、去皮雞肉），補充電解質避免脫水。",
            constipation: "增加水分與適量水溶性纖維，在體力允許下散步。",
            tube: "檢查管路是否彎折，若有滲漏或阻塞，請立即聯繫醫護處理。"
        };

        let html = "";
        document.querySelectorAll('input[type="checkbox"]:checked').forEach(i => {
            html += `<div class="advice-item"><b>針對 ${i.parentElement.innerText.trim()}</b>${maps[i.value]}</div>`;
        });

        // 心理建議
        const f = parseInt(document.getElementById("fatigue").value);
        const pa = parseInt(document.getElementById("pain").value);
        const m = parseInt(document.getElementById("mood").value);
        const s = parseInt(document.getElementById("sleep").value);

        if (f >= 4) html += `<div class="advice-item"><b>疲憊無力建議</b>${f >= 7 ? '<span class="urgent">您的疲憊程度較高，請務必主動告知個管師或醫護人員。</span>' : '調整作息，採取節能方式活動，少量多次休息。'}</div>`;
        if (pa >= 4) html += `<div class="advice-item"><b>疼痛處置建議</b>${pa >= 7 ? '<span class="urgent">疼痛已達重度，建議立即回診或連繫醫療團隊調整止痛藥物。</span>' : '記錄疼痛部位與頻率，並按時服用處方藥物。'}</div>`;
        if (m >= 4) html += `<div class="advice-item"><b>情緒調適建議</b>${m >= 7 ? '<span class="urgent">情緒壓力沉重，建議告知醫護團隊尋求個管師轉介心理師。</span>' : '嘗試深呼吸練習，或與信任的親友分享您的心情。'}</div>`;
        if (s <= 3) html += `<div class="advice-item"><b>睡眠改善建議</b>${s <= 2 ? '<span class="urgent">睡眠問題嚴重，建議主動告知醫師評估輔助改善方案。</span>' : '減少午睡時間，並在睡前維持放鬆環境。'}</div>`;

        document.getElementById("advice-content").innerHTML = html || "<div class='advice-item'>目前狀態良好，請繼續保持觀察。</div>";
        
        let em = "";
        if (isHR) em += "<li>體重流失過快，建議優先預約營養師諮詢。</li>";
        if (document.querySelector('input[value="nausea"]:checked') || document.querySelector('input[value="diarrhea"]:checked')) {
            em += "<li>若出現連續嘔吐或腹瀉，請立即就醫以防脫水。</li>";
        }
        document.getElementById("emergency-area").innerHTML = em ? `<div class="urgent" style="background:#fff0f0; padding:15px; border-radius:12px; margin-top:20px;">🚨 重要提醒：<ul style="margin:5px 0;">${em}</ul></div>` : "";

        document.getElementById("result").style.display = "block";
        window.scrollTo({ top: document.getElementById("result").offsetTop - 20, behavior: 'smooth' });
    }
    </script>
</body>
</html>
